services:
  postgres:
    image: postgres:16-alpine
    container_name: eduos-postgres
    environment:
      POSTGRES_DB: eduos
      POSTGRES_USER: eduos
      POSTGRES_PASSWORD: eduos
    ports:
      - "5432:5432"
    volumes:
      - eduos_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: eduos-redis
    ports:
      - "6379:6379"
    volumes:
      - eduos_redis_data:/data

  opensearch:
    image: opensearchproject/opensearch:2
    container_name: eduos-opensearch
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: eduos-local-admin-123
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - eduos_opensearch_data:/usr/share/opensearch/data

  minio:
    image: minio/minio:latest
    container_name: eduos-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - eduos_minio_data:/data

volumes:
  eduos_postgres_data:
  eduos_redis_data:
  eduos_opensearch_data:
  eduos_minio_data:
